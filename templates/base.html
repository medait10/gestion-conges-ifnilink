<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gestion Congés</title><style>body{margin:0;font-family:Segoe UI,Arial;background:#111827;color:#f9fafb}.nav{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:#0f172a}.brand{font-weight:800;font-size:24px}.container{padding:28px}.card{background:#1f2937;border:1px solid #374151;border-radius:20px;padding:22px;margin-bottom:24px;box-shadow:0 15px 35px #0004}input,textarea,button{padding:12px;border-radius:12px;border:1px solid #4b5563;background:#111827;color:white}button,.btn{background:#2563eb;border:0;cursor:pointer;text-decoration:none;color:white;padding:10px 14px;border-radius:12px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #374151;padding:12px;text-align:left}th{color:#93c5fd}.danger{background:#7f1d1d}.success{background:#14532d}.warning{background:#854d0e}.flash{padding:12px;border-radius:12px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.danger{background:#dc3545!important}.muted{color:#64748b}.status{font-weight:bold}.status.en-attente{color:#b45309}.status.approuve{color:#15803d}.status.refuse{color:#dc2626}.check{display:flex;gap:8px;align-items:center;margin-top:18px}
</style></head><body><div class="nav"><div class="brand">Gestion Congés Pro</div><div>{% if session.user_id %}<span>{{session.username}}</span> <a class="btn" href="{{url_for('logout')}}">Logout</a>{% endif %}</div></div><div class="container">{% with messages=get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}{% endwith %}{% block body %}{% endblock %}</div></body></html>
