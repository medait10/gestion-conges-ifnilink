{% extends "base.html" %}{% block content %}
<div class="login-shell">
  <div class="login-card glass">
    <img class="login-logo-img" src="{{ url_for('static', filename='logo.svg') }}" alt="MEDFLOW">
    <h1>{{ t35("register_title") }}</h1>
    <p>{{ t35("register_subtitle") }}</p>
    <form method="post" class="register-form">
      <input name="full_name" placeholder="{{ t35('full_name') }}" required>
      <input name="email" type="email" placeholder="{{ t35('email') }}" required>
      <input name="username" placeholder="{{ t35('username') }}" required>
      <input name="company" placeholder="{{ t35('company') }}">
      <input name="job_title" placeholder="{{ t35('job_title') }}">
      <label class="simple-label">{{ t35("hire_date") }}<input name="hire_date" type="date"></label>
      <input name="password" type="password" placeholder="{{ t35('password') }}" minlength="10" required>
      <input name="confirm_password" type="password" placeholder="{{ t35('confirm_password') }}" minlength="10" required>
      <button>{{ t35("create_account") }}</button>
    </form>
    <a class="register-link" href="{{ url_for('login') }}">{{ t35("already_registered") }}</a>
  </div>
</div>
{% endblock %}
