<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Erreur - MEDFLOW</title>
  <style>
    body{margin:0;font-family:Segoe UI,Arial;background:#07111f;color:#e5eefb;display:grid;place-items:center;min-height:100vh;padding:20px}
    .card{max-width:720px;width:100%;background:rgba(15,23,42,.86);border:1px solid rgba(148,163,184,.25);border-radius:28px;padding:28px;box-shadow:0 30px 90px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:34px;background:linear-gradient(135deg,#38bdf8,#a78bfa,#22c55e);-webkit-background-clip:text;color:transparent}
    p{line-height:1.7;color:#cbd5e1;white-space:pre-wrap}
    a{display:inline-block;margin-top:16px;background:linear-gradient(135deg,#0ea5e9,#7c3aed);color:white;text-decoration:none;padding:12px 16px;border-radius:14px;font-weight:800}
  </style>
</head>
<body>
  <div class="card">
    <h1>Une erreur est survenue</h1>
    <p>{{ message }}</p>
    <a href="/">{{ tt("back") }} à l’accueil</a>
  </div>
</body>
</html>
