<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Erreur - MEDFLOW</title>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#070b18;color:#eef5ff;min-height:100vh;display:grid;place-items:center;padding:20px}
.card{max-width:720px;width:100%;background:rgba(13,20,38,.92);border:1px solid rgba(225,48,108,.22);border-radius:28px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
h1{margin:0 0 12px;background:linear-gradient(135deg,#405de6,#833ab4,#e1306c,#fcb045);-webkit-background-clip:text;color:transparent}
p{color:#a8b3cf;line-height:1.7;white-space:pre-wrap}
a{display:inline-block;margin-top:16px;padding:12px 18px;border-radius:14px;background:linear-gradient(135deg,#405de6,#833ab4,#e1306c,#fcb045);color:white;text-decoration:none;font-weight:800}
</style>
</head>
<body>
<div class="card">
<h1>Une erreur est survenue</h1>
<p>{{ message }}</p>
<a href="/">Retour à l’accueil</a>
</div>
</body>
</html>
