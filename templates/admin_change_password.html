{% extends "base.html" %}{% block content %}
<div class="hero glass">
  <div>
    <span class="eyebrow">Sécurité</span>
    <h1>Changer le mot de passe admin</h1>
    <p>Utilise un mot de passe long et unique. Minimum 14 caractères.</p>
  </div>
</div>
<div class="panel glass">
  <form method="post" class="form-grid">
    <label>{{ tt("password") }} actuel
      <input type="password" name="current_password" required autocomplete="current-password">
    </label>
    <label>Nouveau mot de passe
      <input type="password" name="new_password" required minlength="14" autocomplete="new-password">
    </label>
    <label>Confirmer
      <input type="password" name="confirm_password" required minlength="14" autocomplete="new-password">
    </label>
    <button>Mettre à jour</button>
  </form>
</div>
{% endblock %}
